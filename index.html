<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokalni TV Predvajalnik</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        h1 { color: #00dfa2; font-size: 28px; margin-bottom: 15px; }
        .main-layout { display: flex; gap: 30px; height: 85vh; }
        .left-panel { width: 35%; display: flex; flex-direction: column; gap: 20px; }
        
        .section {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #333;
        }
        .section h2 { font-size: 18px; margin-top: 0; color: #00dfa2; }
        
        /* Skriti privzeti gumbi za datoteke in lepe nove tipke */
        input[type="file"] { display: none; }
        
        .btn {
            display: inline-block;
            background-color: #00dfa2;
            color: black;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
            width: 85%;
            text-align: center;
            font-size: 16px;
        }
        .btn-secondary { background-color: #444; color: white; }
        .file-status { font-size: 14px; color: #aaa; margin-bottom: 15px; }

        /* Predvajalnik desno */
        .right-panel { width: 65%; background: black; border-radius: 8px; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Izgled podnapisov na zaslonu */
        ::cue {
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎬 Lokalni TV Predvajalnik & Podnapisi</h1>
    
    <div class="main-layout">
        <!-- LEVI PANEL: Nalaganje datotek -->
        <div class="left-panel">
            
            <!-- Izbira videa -->
            <div class="section">
                <h2>1. Korak: Izbira Videa</h2>
                <label class="btn" for="videoInput">Izberi Video Datoteko</label>
                <input type="file" id="videoInput" accept="video/*">
                <div class="file-status" id="videoStatus">Noben video ni izbran (Podpira MP4, WebM...)</div>
            </div>

            <!-- Izbira podnapisov -->
            <div class="section">
                <h2>2. Korak: Izbira Podnapisov</h2>
                <label class="btn btn-secondary" for="subInput">Izberi Podnapis (.srt ali .vtt)</label>
                <input type="file" id="subInput" accept=".srt,.vtt">
                <div class="file-status" id="subStatus">Noben podnapis ni izbran</div>
            </div>

            <!-- Iskanje na podnapisi.org -->
            <div class="section">
                <h2>Iskanje na spletu</h2>
                <button class="btn btn-secondary" onclick="window.open('https://slo-podnapisi.net', '_blank')">Odpri Podnapisi.org</button>
            </div>
        </div>

        <!-- DESNI PANEL: Video predvajalnik -->
        <div class="right-panel">
            <video id="tvPlayer" controls>
                <track id="playerTrack" kind="subtitles" srclang="sl" label="Slovenščina" default>
                Vaš brskalnik ne podpira predvajalnika.
            </video>
        </div>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const subInput = document.getElementById('subInput');
        const player = document.getElementById('tvPlayer');
        const track = document.getElementById('playerTrack');
        
        const videoStatus = document.getElementById('videoStatus');
        const subStatus = document.getElementById('subStatus');

        // 1. Nalaganje in predvajanje lokalnega videa
        videoInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                videoStatus.innerText = "Izbrano: " + file.name;
                const fileURL = URL.createObjectURL(file);
                player.src = fileURL;
                player.play();
            }
        });

        // 2. Nalaganje podnapisov (z avtomatsko pretvorbo iz SRT v VTT)
        subInput.addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;
            
            subStatus.innerText = "Izbrano: " + file.name;
            const reader = new FileReader();

            reader.onload = function(e) {
                let text = e.target.result;

                // Če je datoteka .srt, jo pretvorimo v .vtt format, ki ga brskalnik zahteva
                if (file.name.endsWith('.srt')) {
                    text = "WEBVTT\n\n" + text
                        .replace(/,/g, '.') // SRT uporablja vejice, VTT piko za milisekunde
                        .replace(/(\d\d:\d\d:\d\d\.\d\d\d) --> (\d\d:\d\d:\d\d\.\d\d\d)/g, '$1 --> $2');
                }

                // Ustvarimo začasno povezavo do predelanega podnapisa
                const vttBlob = new Blob([text], { type: 'text/vtt' });
                track.src = URL.createObjectURL(vttBlob);
                alert("Podnapis je pripravljen in naložen!");
            };

            reader.readAsText(file);
        });

        // Tipka 'Enter' na daljincu raztegne video čez cel zaslon
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && player.src) {
                if (player.requestFullscreen) {
                    player.requestFullscreen();
                }
            }
        });
    </script>
</body>
</html>
