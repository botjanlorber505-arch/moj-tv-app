<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moj TV Predvajalnik</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px; 
            margin: 0;
        }
        h1 { color: #00dfa2; font-size: 36px; margin-bottom: 30px; }
        .box {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            border: 2px solid #333;
            max-width: 550px;
            width: 100%;
        }
        .btn { 
            background-color: #00dfa2; 
            color: black; 
            border: none; 
            padding: 20px 50px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s;
            margin-top: 20px;
        }
        .btn:focus, .btn:hover { 
            background-color: #ffffff; 
            box-shadow: 0 0 20px #00dfa2;
            transform: scale(1.05);
        }
        p { color: #aaa; font-size: 16px; margin-top: 25px; line-height: 1.5; }
        .status { color: #ffc107; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>🎬 Moj TV Predvajalnik</h1>
    
    <div class="box">
        <p style="font-size: 18px; color: #eee; margin-top: 0;">Aplikacija je nastavljena na vašo mapo s filmi na računalniku.</p>
        
        <!-- Velik gumb, ki je takoj pripravljen za klik z daljincem -->
        <button class="btn" id="startBtn" onclick="odpriBrskalnik()">Odpri mapo s filmi</button>
        
        <p><b>Navodilo:</b> Gumb je že samodejno izbran. Na daljinskem upravljalniku samo pritisnite tipko <b>OK</b>.</p>
        <div class="status">Pred klikom preverite, da program HFS na računalniku teče.</div>
    </div>

    <script>
        // Samodejno postavi izbiro (fokus) na gumb takoj, ko se stran naloži na televizorju
        window.onload = function() {
            document.getElementById('startBtn').focus();
        };

        function odpriBrskalnik() {
            // Naslov je sedaj trajno in varno zapisan neposredno v programskem ukazu
            window.location.href = "http://192.168.1";
        }
    </script>
</body>
</html>
