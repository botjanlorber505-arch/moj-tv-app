<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moj TV Povezovalec</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 50px; 
        }
        h1 { color: #00dfa2; font-size: 32px; margin-bottom: 30px; }
        .box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 2px solid #333;
            max-width: 500px;
            width: 100%;
        }
        input { 
            width: 90%; 
            padding: 15px; 
            background: #333; 
            border: 1px solid #555; 
            color: white; 
            border-radius: 6px; 
            margin-bottom: 20px; 
            font-size: 18px; 
            text-align: center;
        }
        .btn { 
            background-color: #00dfa2; 
            color: black; 
            border: none; 
            padding: 15px 30px; 
            font-weight: bold; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 18px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #00b382; }
        p { color: #aaa; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>🎬 Moj TV Predvajalnik</h1>
    
    <div class="box">
        <label style="font-size: 18px; display:block; margin-bottom: 10px;">Vpišite naslov iz HFS programa na računalniku:</label>
        <!-- Vpišite vaš privzeti IP spodaj, da vam ga ne bo treba vsakič tipkati -->
        <input type="text" id="pcIp" value="http://192.168.1.100:8080" placeholder="http://1.xx">
        <br>
        <button class="btn" onclick="odpriBrskalnik()">Odpri mapi in predvajaj</button>
        
        <p>Prepričajte se, da sta televizor in računalnik povezana na isti Wi-Fi.</p>
    </div>

    <script>
        function odpriBrskalnik() {
            let ip = document.getElementById('pcIp').value.trim();
            if(ip) {
                // Koda vas bo takoj preusmerila na vgrajeno spletno stran vašega računalnika
                window.location.href = ip;
            } else {
                alert("Prosimo, vnesite IP naslov.");
            }
        }
    </script>
</body>
</html>
